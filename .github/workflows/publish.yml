name: Publish to PyPI

on:
  push:
    tags:
      - "*.*.*"

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.14"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-stubs:
    name: Build stub packages
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stub: ["twoddoc", "2ddoc"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build ${{ matrix.stub }}
        run: python -m build stubs/${{ matrix.stub }}

      - name: Upload ${{ matrix.stub }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-stub-${{ matrix.stub }}
          path: stubs/${{ matrix.stub }}/dist/

  publish:
    name: Publish py2ddoc to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/py2ddoc
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-stubs:
    name: Publish ${{ matrix.stub }} to PyPI
    needs: [publish, build-stubs]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stub: ["twoddoc", "2ddoc"]
    environment:
      name: pypi-${{ matrix.stub }}
      url: https://pypi.org/p/${{ matrix.stub }}
    permissions:
      id-token: write
    steps:
      - name: Download ${{ matrix.stub }} artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-stub-${{ matrix.stub }}
          path: dist/

      - name: Publish ${{ matrix.stub }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
